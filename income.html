<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Income - ArthaFlow</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar">

<a href="index.html">🏠 Dashboard</a>

<a href="income.html">💰 Income</a>

<a href="expense.html">💸 Expense</a>

<a href="reports.html">📊 Reports</a>

<a href="settings.html">⚙ Settings</a>

    </nav>

    <h1>💰 Income</h1>

    <p>Add your income</p>
    
    <h2>Total Income</h2>
<h1 id="totalIncome">₹0</h1>

    <div class="card">

        <label>Category</label>
        <input type="text" id="category" placeholder="Salary / Business / Teaching">

        <label>Amount</label>
        <input type="number" id="amount" placeholder="₹ Enter Amount">

        <label>Date</label>
<input type="date" id="incomeDate">

<label>Note</label>
<input type="text" id="incomeNote" placeholder="Example: July Salary">

        <button onclick="saveIncome()">
    💾 Save Income
        </button>

    </div>

    <input
type="text"
id="searchIncome"
placeholder="🔍 Search Category..."
onkeyup="searchIncome()">

    <select id="incomeFilter" onchange="filterIncome()">

<option value="all">All Categories</option>

<option value="Salary">Salary</option>

<option value="Business">Business</option>

<option value="Teaching">Teaching</option>

<option value="Other">Other</option>

    </select>
    
    <h2>Income History</h2>

<ul id="incomeList"></ul>

    <footer class="footer">

<p>
© 2026 ArthaFlow • Developed by Aditya Aakash
</p>

    </footer>

<script src="js/script.js"></script>

</body>

</html>
