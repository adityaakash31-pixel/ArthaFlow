<h1>💸 Expense</h1>

<p>Add your expense</p>

<h2>Total Expense</h2>

<h1 id="totalExpense">₹0</h1>

<div class="card">

<label>Category</label>
<input type="text" id="expenseCategory" placeholder="Food / Travel / Shopping">

<label>Amount</label>
<input type="number" id="expenseAmount" placeholder="₹ Enter Amount">

  <label>Date</label>
<input type="date" id="expenseDate">

<label>Note</label>
<input type="text" id="expenseNote" placeholder="Example: Lunch / Petrol / Shopping">

<button onclick="saveExpense()">
💾 Save Expense
</button>

</div>

  <input
type="text"
id="searchExpense"
placeholder="🔍 Search Expense..."
onkeyup="searchExpense()">

  <select id="expenseSort" onchange="sortExpense()">
<option value="latest">Latest First</option>
<option value="oldest">Oldest First</option>
<option value="high">Highest Amount</option>
<option value="low">Lowest Amount</option>
  </select>

  <select id="expenseFilter" onchange="filterExpense()">
    <option value="all">📋 All Expenses</option>
    <option value="today">📅 Today</option>
    <option value="month">🗓 This Month</option>
  </select>
<br><br>

<select id="expenseFilter" onchange="filterExpense()">

<option value="all">All Categories</option>

<option value="Food">Food</option>

<option value="Travel">Travel</option>

<option value="Shopping">Shopping</option>

<option value="Other">Other</option>

</select>

<h2>Expense History</h2>
<input
type="text"
id="searchExpense"
placeholder="🔍 Search Expense..."
onkeyup="searchExpense()">

<ul id="expenseList"></ul>
