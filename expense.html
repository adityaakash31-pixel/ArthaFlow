<h1>💸 Expense</h1>

<p>Add your expense</p>

<h2>Total Expense</h2>

<h1 id="totalExpense">₹0</h1>

<div class="card">

<label>Category</label>
<input type="text" id="expenseCategory" placeholder="Food / Travel / Shopping">

<label>Amount</label>
<input type="number" id="expenseAmount" placeholder="₹ Enter Amount">

  <label>Date</label>
<input type="date" id="expenseDate">

<label>Note</label>
<input type="text" id="expenseNote" placeholder="Example: Lunch / Petrol / Shopping">
