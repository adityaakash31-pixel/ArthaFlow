<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArthaFlow</title>

<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#0f172a;
color:white;
font-family:Arial,sans-serif;
flex-direction:column;
}

h1{
font-size:40px;
margin:0;
}

p{
font-size:18px;
margin-top:10px;
opacity:.8;
}

.loader{
margin-top:25px;
width:50px;
height:50px;
border:5px solid #ffffff33;
border-top:5px solid #00e5ff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}
</style>

</head>

<body>

<h1>ArthaFlow</h1>
<p>Loading...</p>

<div class="loader"></div>

<script>

setTimeout(function(){

if(localStorage.getItem("appPin")){

window.location.href="pin-lock.html";

}else{

window.location.href="pin-setup.html";

}

},3000);

</script>

</body>
</html>
